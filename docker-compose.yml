version: '3.8'

services:
  birdnet-go:
    image: tphakala/birdnet-go:latest
    container_name: birdnet-go
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - birdnet-data:/data
    environment:
      - TZ=Europe/Madrid
    devices:
      - /dev/snd:/dev/snd

volumes:
  birdnet-data:
